apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: go-api-db-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: REPLACE_WITH_YOUR_GIT_REPO_URL
    targetRevision: main
    path: k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: devops-lab
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
