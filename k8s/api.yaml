# Set image tag via env or sed before apply:
#   export IMAGE_TAG=$(git rev-parse HEAD)   # CI SHA — same as Actions
#   sed "s/REPLACE_TAG/$IMAGE_TAG/g" api.yaml | kubectl apply -f -
#
# Registry must match Lab 4 (.github/workflows/acr-push.yaml).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: devops-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: api
          image: crpi-fhpva5vbhc90jggd.ap-southeast-1.personal.cr.aliyuncs.com/devops-lab-scark/go-api-db:075c3e07903d73443f7cd5f199322c19fc6aa666
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              value: postgres://app:app@db.devops-lab.svc.cluster.local:5432/app?sslmode=disable
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: devops-lab
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 8080
