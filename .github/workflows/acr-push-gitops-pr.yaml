# Lab 16: build and push to ACR, then open a PR that updates the Kustomize image tag.
#
# This is the safer GitOps flow:
#   GitHub Actions builds the image and opens a PR with the new tag.
#   A human reviews and merges the PR.
#   Argo CD notices the Git change on main and syncs the cluster.
#
# GitHub Secrets:
#   ACR_USERNAME
#   ACR_PASSWORD

name: Build, push, and open GitOps PR

on:
  push:
    branches: [main]
    paths-ignore:
      - k8s/overlays/dev/kustomization.yaml

permissions:
  contents: write
  pull-requests: write

env:
  REGION: ap-southeast-1
  REGISTRY: crpi-fhpva5vbhc90jggd.ap-southeast-1.personal.cr.aliyuncs.com
  NAMESPACE: devops-lab-scark
  IMAGE_NAME: go-api-db
  KUSTOMIZE_OVERLAY: k8s/overlays/dev
  KUSTOMIZE_IMAGE_NAME: crpi-fhpva5vbhc90jggd.ap-southeast-1.personal.cr.aliyuncs.com/devops-lab-scark/go-api-db

jobs:
  build-push-open-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Vet
        run: go vet ./...

      - name: Log in to ACR (Personal Edition)
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login \
            --username="${{ secrets.ACR_USERNAME }}" \
            --password-stdin \
            "${{ env.REGISTRY }}"

      - name: Build and push image
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}
        run: |
          docker build -t "${IMAGE}:${{ github.sha }}" .
          docker push "${IMAGE}:${{ github.sha }}"

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update Kustomize image tag
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}
        run: |
          kustomize edit set image \
            "${{ env.KUSTOMIZE_IMAGE_NAME }}=${IMAGE}:${{ github.sha }}"
        working-directory: ${{ env.KUSTOMIZE_OVERLAY }}

      - name: Show GitOps manifest diff
        run: git diff -- "${{ env.KUSTOMIZE_OVERLAY }}/kustomization.yaml"

      - name: Open image tag pull request
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: gitops/update-image-${{ github.sha }}
        run: |
          if git diff --quiet -- "${{ env.KUSTOMIZE_OVERLAY }}/kustomization.yaml"; then
            echo "Kustomize image tag already matches ${{ github.sha }}; no PR needed."
            exit 0
          fi

          git checkout -b "${BRANCH_NAME}"
          git add "${{ env.KUSTOMIZE_OVERLAY }}/kustomization.yaml"
          git -c user.name="github-actions[bot]" \
            -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
            commit -m "Update dev image tag to ${{ github.sha }}"
          git push -u origin "${BRANCH_NAME}"

          gh pr create \
            --base main \
            --head "${BRANCH_NAME}" \
            --title "Update dev image tag to ${{ github.sha }}" \
            --body "$(cat <<'EOF'
## Summary
- Updates the dev Kustomize image tag to the image built from this commit.
- Argo CD will sync the change after this PR is merged to `main`.

## Test plan
- GitHub Actions built and pushed the image to ACR.
- Review the Kustomize tag diff before merging.

EOF
)"
