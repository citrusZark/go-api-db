# Lab 4: build and push to ACR Personal Edition
#
# Personal Edition does NOT support GetAuthorizationToken (AccessKey via acr-login).
# Use registry username + Docker login password from Access Credential.
#
# GitHub Secrets:
#   ACR_USERNAME   e.g. thoha1@569647806.onaliyun.com
#   ACR_PASSWORD   Registry password (Access Credential → Set Password), NOT RAM secret

name: Build and push to ACR

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGION: ap-southeast-1
  REGISTRY: crpi-fhpva5vbhc90jggd.ap-southeast-1.personal.cr.aliyuncs.com
  NAMESPACE: devops-lab-scark
  IMAGE_NAME: go-api-db

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Vet
        run: go vet ./...

      - name: Log in to ACR (Personal Edition)
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login \
            --username="${{ secrets.ACR_USERNAME }}" \
            --password-stdin \
            "${{ env.REGISTRY }}"

      - name: Build and push image
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}
        run: |
          docker build -t "${IMAGE}:${{ github.sha }}" .
          docker push "${IMAGE}:${{ github.sha }}"
