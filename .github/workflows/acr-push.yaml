# Lab 4: build and push to ACR Personal Edition
#
# Personal Edition does NOT support GetAuthorizationToken (AccessKey via acr-login).
# Use registry username + Docker login password from Access Credential.
#
# GitHub Secrets:
#   ACR_USERNAME   e.g. thoha1@569647806.onaliyun.com
#   ACR_PASSWORD   Registry password (Access Credential → Set Password), NOT RAM secret

name: Build and push to ACR

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGION: ap-southeast-1
  REGISTRY: crpi-fhpva5vbhc90jggd.ap-southeast-1.personal.cr.aliyuncs.com
  NAMESPACE: devops-lab-scark
  IMAGE_NAME: go-api-db
  KUBE_NAMESPACE: devops-lab
  KUBE_DEPLOYMENT: api
  KUBE_CONTAINER: api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Vet
        run: go vet ./...

      - name: Log in to ACR (Personal Edition)
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login \
            --username="${{ secrets.ACR_USERNAME }}" \
            --password-stdin \
            "${{ env.REGISTRY }}"
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Build and push image
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}
        run: |
          docker build -t "${IMAGE}:${{ github.sha }}" .
          docker push "${IMAGE}:${{ github.sha }}"

      - name: Set up kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "${{ secrets.ACK_KUBECONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Deploy to ACK
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: |
          kubectl -n "${{ env.KUBE_NAMESPACE }}" set image \
            deploy/${{ env.KUBE_DEPLOYMENT }} \
            ${{ env.KUBE_CONTAINER }}="${IMAGE}"
          kubectl -n "${{ env.KUBE_NAMESPACE }}" rollout status \
            deploy/${{ env.KUBE_DEPLOYMENT }}

      - name: Show deployed image
        run: |
          kubectl -n "${{ env.KUBE_NAMESPACE }}" get deploy "${{ env.KUBE_DEPLOYMENT }}" \
            -o jsonpath='{.spec.template.spec.containers[0].image}{"\n"}'